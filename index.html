<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bobathon June 18 Hackathon Voting</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            padding: 30px;
            background: rgba(255, 255, 255, 0.1);
            border-radius: 20px;
            backdrop-filter: blur(10px);
        }

        h1 {
            font-size: 3em;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .trophy {
            font-size: 4em;
            margin-bottom: 10px;
        }

        .subtitle {
            font-size: 1.3em;
            opacity: 0.9;
        }

        .connection-status {
            text-align: center;
            padding: 10px;
            margin-bottom: 20px;
            border-radius: 10px;
            font-weight: bold;
        }

        .connection-status.connected {
            background: rgba(56, 239, 125, 0.2);
            color: #38ef7d;
        }

        .connection-status.disconnected {
            background: rgba(235, 51, 73, 0.2);
            color: #eb3349;
        }

        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 25px;
            margin-bottom: 30px;
        }

        .project-card {
            background: white;
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }

        .project-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.3);
        }

        .project-card.selected {
            border: 4px solid #ffd700;
            background: linear-gradient(135deg, #fff9e6 0%, #ffffff 100%);
        }

        .project-card.selected::before {
            content: '⭐';
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 2em;
            animation: pulse 1s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.2); }
        }

        .flag {
            font-size: 4em;
            text-align: center;
            margin-bottom: 15px;
        }

        .country-name {
            font-size: 1.8em;
            font-weight: bold;
            color: #333;
            margin-bottom: 10px;
            text-align: center;
        }

        .country-name.editable {
            border: 2px dashed #ccc;
            padding: 10px;
            border-radius: 5px;
            cursor: text;
        }

        .country-name.editable:hover {
            border-color: #667eea;
            background: #f9f9f9;
        }

        .project-description {
            color: #666;
            line-height: 1.6;
            margin-bottom: 15px;
            min-height: 60px;
            font-style: italic;
        }

        .project-description.editable {
            border: 2px dashed #ccc;
            padding: 10px;
            border-radius: 5px;
            cursor: text;
        }

        .project-description.editable:hover {
            border-color: #667eea;
            background: #f9f9f9;
        }

        .vote-count {
            text-align: center;
            font-size: 1.2em;
            color: #667eea;
            font-weight: bold;
            margin-top: 15px;
            padding-top: 15px;
            border-top: 2px solid #eee;
        }

        .vote-button {
            width: 100%;
            padding: 12px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 15px;
        }

        .vote-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .vote-button:active {
            transform: scale(0.98);
        }

        .results-section {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
            margin-top: 30px;
        }

        .results-title {
            font-size: 2em;
            color: #333;
            margin-bottom: 20px;
            text-align: center;
        }

        .winner-announcement {
            background: linear-gradient(135deg, #ffd700 0%, #ffed4e 100%);
            padding: 30px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 20px;
            box-shadow: 0 5px 20px rgba(255, 215, 0, 0.4);
        }

        .winner-announcement h2 {
            font-size: 2.5em;
            color: #333;
            margin-bottom: 10px;
        }

        .winner-flag {
            font-size: 5em;
            margin: 20px 0;
        }

        .results-list {
            list-style: none;
        }

        .result-item {
            display: flex;
            align-items: center;
            padding: 15px;
            margin-bottom: 10px;
            background: #f5f5f5;
            border-radius: 10px;
            transition: all 0.3s ease;
        }

        .result-item:hover {
            background: #e8e8e8;
        }

        .result-rank {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-right: 15px;
            min-width: 40px;
        }

        .result-flag {
            font-size: 2em;
            margin-right: 15px;
        }

        .result-info {
            flex: 1;
        }

        .result-country {
            font-size: 1.3em;
            font-weight: bold;
            color: #333;
        }

        .result-votes {
            font-size: 1.5em;
            font-weight: bold;
            color: #667eea;
            margin-left: auto;
        }

        .control-buttons {
            display: flex;
            gap: 15px;
            justify-content: center;
            margin-top: 20px;
        }

        .control-button {
            padding: 12px 30px;
            border: none;
            border-radius: 8px;
            font-size: 1.1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .show-results-btn {
            background: linear-gradient(135deg, #11998e 0%, #38ef7d 100%);
            color: white;
        }

        .reset-btn {
            background: linear-gradient(135deg, #eb3349 0%, #f45c43 100%);
            color: white;
        }

        .control-button:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 15px rgba(0, 0, 0, 0.3);
        }

        .hidden {
            display: none;
        }

        .edit-mode-toggle {
            text-align: center;
            margin-bottom: 20px;
        }

        .edit-mode-btn {
            padding: 10px 25px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .edit-mode-btn:hover {
            background: #764ba2;
        }

        .edit-mode-btn.active {
            background: #38ef7d;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2em;
            }
            
            .projects-grid {
                grid-template-columns: 1fr;
            }
            
            .control-buttons {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <div class="trophy">🏆</div>
            <h1>Bobathon June 18 Hackathon Voting</h1>
            <p class="subtitle">Vote for Your Favorite Hackathon Project!</p>
        </header>

        <div id="connectionStatus" class="connection-status disconnected">
            🔄 Connecting to Firebase...
        </div>

        <div class="edit-mode-toggle">
            <button class="edit-mode-btn" onclick="toggleEditMode()">
                📝 Edit Project Titles & Descriptions
            </button>
        </div>

        <div id="votingSection">
            <div class="projects-grid" id="projectsGrid">
                <!-- Projects will be dynamically generated -->
            </div>

            <div class="control-buttons">
                <button class="control-button show-results-btn" onclick="showResults()">
                    📊 Show Results
                </button>
                <button class="control-button reset-btn" onclick="resetVotes()">
                    🔄 Reset All Votes
                </button>
            </div>
        </div>

        <div id="resultsSection" class="results-section hidden">
            <h2 class="results-title">🏆 Final Results 🏆</h2>
            <div id="winnerAnnouncement"></div>
            <ul class="results-list" id="resultsList"></ul>
            <div class="control-buttons">
                <button class="control-button show-results-btn" onclick="backToVoting()">
                    ← Back to Voting
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js';
        import { getDatabase, ref, set, onValue, update, get } from 'https://www.gstatic.com/firebasejs/10.7.1/firebase-database.js';

        // Your Firebase configuration
        const firebaseConfig = {
            apiKey: "AIzaSyCITNIV6RyoCgIQJziv9WYxOGPq-1-ct04",
            authDomain: "bobathon-voting.firebaseapp.com",
            databaseURL: "https://bobathon-voting-default-rtdb.firebaseio.com",
            projectId: "bobathon-voting",
            storageBucket: "bobathon-voting.firebasestorage.app",
            messagingSenderId: "88996679714",
            appId: "1:88996679714:web:13f4b19f7dacbb05ffba7b"
        };

        // Initialize Firebase
        const app = initializeApp(firebaseConfig);
        const database = getDatabase(app);

        // Project data
        const defaultProjects = [
            {
                id: 1,
                country: 'Project 1',
                flag: '📊',
                description: 'Click to add project description...',
                votes: 0
            },
            {
                id: 2,
                country: 'Project 2',
                flag: '🗂️',
                description: 'Click to add project description...',
                votes: 0
            },
            {
                id: 3,
                country: 'Project 3',
                flag: '📈',
                description: 'Click to add project description...',
                votes: 0
            },
            {
                id: 4,
                country: 'Project 4',
                flag: '🔗',
                description: 'Click to add project description...',
                votes: 0
            },
            {
                id: 5,
                country: 'Project 5',
                flag: '📋',
                description: 'Click to add project description...',
                votes: 0
            },
            {
                id: 6,
                country: 'Project 6',
                flag: '🗃️',
                description: 'Click to add project description...',
                votes: 0
            },
            {
                id: 7,
                country: 'Project 7',
                flag: '📑',
                description: 'Click to add project description...',
                votes: 0
            },
            {
                id: 8,
                country: 'Project 8',
                flag: '💾',
                description: 'Click to add project description...',
                votes: 0
            }
        ];

        let projects = [...defaultProjects];
        let editMode = false;

        // Initialize database with default data if empty
        async function initializeDatabase() {
            const projectsRef = ref(database, 'projects');
            const snapshot = await get(projectsRef);
            
            if (!snapshot.exists()) {
                await set(projectsRef, defaultProjects);
                console.log('Database initialized with default projects');
            }
        }

        // Update connection status
        function updateConnectionStatus(connected) {
            const statusDiv = document.getElementById('connectionStatus');
            if (connected) {
                statusDiv.className = 'connection-status connected';
                statusDiv.textContent = '✅ Connected - Real-time voting active!';
            } else {
                statusDiv.className = 'connection-status disconnected';
                statusDiv.textContent = '❌ Disconnected - Reconnecting...';
            }
        }

        // Listen for real-time updates
        function setupRealtimeListener() {
            const projectsRef = ref(database, 'projects');
            
            onValue(projectsRef, (snapshot) => {
                updateConnectionStatus(true);
                const data = snapshot.val();
                if (data) {
                    projects = data;
                    renderProjects();
                }
            }, (error) => {
                console.error('Firebase error:', error);
                updateConnectionStatus(false);
            });
        }

        // Toggle edit mode
        window.toggleEditMode = function() {
            editMode = !editMode;
            const btn = document.querySelector('.edit-mode-btn');
            btn.classList.toggle('active');
            btn.textContent = editMode ? '✅ Done Editing' : '📝 Edit Project Titles & Descriptions';
            renderProjects();
        }

        // Render projects
        function renderProjects() {
            const grid = document.getElementById('projectsGrid');
            grid.innerHTML = '';

            projects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card';
                card.id = `project-${project.id}`;

                const titleClass = editMode ? 'country-name editable' : 'country-name';
                const titleContent = editMode ? 
                    `<div class="${titleClass}" contenteditable="true" onblur="saveTitle(${project.id}, this.textContent)">${project.country}</div>` :
                    `<div class="${titleClass}">${project.country}</div>`;

                const descClass = editMode ? 'project-description editable' : 'project-description';
                const descContent = editMode ? 
                    `<div class="${descClass}" contenteditable="true" onblur="saveDescription(${project.id}, this.textContent)">${project.description}</div>` :
                    `<div class="${descClass}">${project.description}</div>`;

                card.innerHTML = `
                    <div class="flag">${project.flag}</div>
                    ${titleContent}
                    ${descContent}
                    ${!editMode ? `
                        <button class="vote-button" onclick="vote(${project.id})">
                            Vote for ${project.country}
                        </button>
                        <div class="vote-count">Votes: ${project.votes}</div>
                    ` : ''}
                `;

                grid.appendChild(card);
            });
        }

        // Save title to Firebase
        window.saveTitle = async function(projectId, text) {
            const projectIndex = projects.findIndex(p => p.id === projectId);
            if (projectIndex !== -1) {
                const updates = {};
                updates[`projects/${projectIndex}/country`] = text.trim();
                await update(ref(database), updates);
            }
        }

        // Save description to Firebase
        window.saveDescription = async function(projectId, text) {
            const projectIndex = projects.findIndex(p => p.id === projectId);
            if (projectIndex !== -1) {
                const updates = {};
                updates[`projects/${projectIndex}/description`] = text.trim();
                await update(ref(database), updates);
            }
        }

        // Vote for a project
        window.vote = async function(projectId) {
            const projectIndex = projects.findIndex(p => p.id === projectId);
            if (projectIndex !== -1) {
                const newVotes = (projects[projectIndex].votes || 0) + 1;
                const updates = {};
                updates[`projects/${projectIndex}/votes`] = newVotes;
                await update(ref(database), updates);
                
                // Visual feedback
                const card = document.getElementById(`project-${projectId}`);
                card.classList.add('selected');
                setTimeout(() => {
                    card.classList.remove('selected');
                }, 1000);
            }
        }

        // Show results
        window.showResults = function() {
            document.getElementById('votingSection').classList.add('hidden');
            document.getElementById('resultsSection').classList.remove('hidden');

            const sorted = [...projects].sort((a, b) => (b.votes || 0) - (a.votes || 0));

            const winner = sorted[0];
            const winnerDiv = document.getElementById('winnerAnnouncement');
            winnerDiv.innerHTML = `
                <div class="winner-announcement">
                    <h2>🎉 Winner! 🎉</h2>
                    <div class="winner-flag">${winner.flag}</div>
                    <h2>${winner.country}</h2>
                    <p style="font-size: 1.5em; margin-top: 10px;">${winner.votes || 0} votes</p>
                </div>
            `;

            const resultsList = document.getElementById('resultsList');
            resultsList.innerHTML = '';
            sorted.forEach((project, index) => {
                const li = document.createElement('li');
                li.className = 'result-item';
                li.innerHTML = `
                    <div class="result-rank">#${index + 1}</div>
                    <div class="result-flag">${project.flag}</div>
                    <div class="result-info">
                        <div class="result-country">${project.country}</div>
                    </div>
                    <div class="result-votes">${project.votes || 0} votes</div>
                `;
                resultsList.appendChild(li);
            });
        }

        // Back to voting
        window.backToVoting = function() {
            document.getElementById('resultsSection').classList.add('hidden');
            document.getElementById('votingSection').classList.remove('hidden');
        }

        // Reset all votes
        window.resetVotes = async function() {
            if (confirm('Are you sure you want to reset all votes? This cannot be undone.')) {
                const updates = {};
                projects.forEach((project, index) => {
                    updates[`projects/${index}/votes`] = 0;
                });
                await update(ref(database), updates);
                alert('All votes have been reset!');
            }
        }

        // Initialize
        initializeDatabase().then(() => {
            setupRealtimeListener();
        });
    </script>
</body>
</html>
